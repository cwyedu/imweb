<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RPS | 智慧猜拳</title>
    <meta name="description" content="使用 MediaPipe AI 技術的互動剪刀石頭布遊戲。">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">AI<span>RPS</span></div>
            <div class="scoreboard">
                <div class="score-item">
                    <span class="label">PLAYER</span>
                    <span id="player-score" class="value">0</span>
                </div>
                <div class="divider">:</div>
                <div class="score-item">
                    <span class="label">AI</span>
                    <span id="ai-score" class="value">0</span>
                </div>
            </div>
        </header>

        <main>
            <div class="game-layout">
                <!-- User View -->
                <div class="view-panel player-view">
                    <div class="view-label">玩家 (你)</div>
                    <div class="video-wrapper">
                        <video id="webcam" autoplay playsinline></video>
                        <canvas id="output_canvas"></canvas>
                        <div id="gesture-overlay" class="gesture-name">等待偵測...</div>
                    </div>
                </div>

                <!-- Game Center -->
                <div class="center-panel">
                    <div id="status-msg" class="status-msg">點擊開始進行挑戰</div>
                    <div id="countdown" class="countdown-display"></div>
                    <div id="game-controls">
                        <button id="btn-cam" class="btn-main">開啟鏡頭</button>
                        <button id="btn-start" class="btn-main" style="display: none;">開始遊戲</button>
                    </div>
                </div>

                <!-- AI View -->
                <div class="view-panel ai-view">
                    <div class="view-label">AI 對手</div>
                    <div class="ai-card" id="ai-card">
                        <div class="ai-icon" id="ai-icon">🤖</div>
                        <div class="ai-choice-name" id="ai-choice-text">思考中...</div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <a href="../index.html" class="back-link">← 回到主頁</a>
            <p>Powered by MediaPipe Hands AI</p>
        </footer>
    </div>

    <!-- MediaPipe Tasks Vision SDK -->
    <script type="module" src="script.js"></script>
</body>
</html>
