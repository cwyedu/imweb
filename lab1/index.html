<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Guesser | 猜歌挑戰</title>
    <meta name="description" content="挑戰你的聽力！15秒猜出正確歌名。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>SONG<span>GUESSER</span></h1>
            <p>聽聲辨位，挑戰你的音樂記憶</p>
        </header>

        <main>
            <div class="player-card">
                <div class="audio-visualizer">
                    <div id="visualizer-bar" class="visualizer-bar"></div>
                    <div class="status-icon" id="status-icon">🎵</div>
                </div>

                <div class="info-section">
                    <div id="timer-display" class="timer-display">00:15</div>
                    <div id="answer-display" class="answer-display hidden">正確答案：<span>---</span></div>
                </div>

                <div class="input-section">
                    <div class="input-group">
                        <input type="text" id="guess-input" placeholder="輸入你猜的歌名..." autocomplete="off">
                        <button id="btn-check" class="btn btn-check">檢查答案</button>
                    </div>
                </div>

                <div class="controls">
                    <div class="control-row">
                        <button id="btn-start" class="btn btn-primary">開始猜歌</button>
                        <button id="btn-restart" class="btn btn-secondary">重來一首</button>
                        <button id="btn-pause" class="btn btn-secondary" disabled>暫停</button>
                        <button id="btn-resume" class="btn btn-secondary" disabled>繼續</button>
                    </div>
                    <button id="btn-more" class="btn btn-secondary" disabled>再聽 15 秒</button>
                    <button id="btn-show" class="btn btn-accent" disabled>公佈答案</button>
                </div>
            </div>
        </main>

        <footer>
            <a href="../index.html" class="back-link">← 回到主頁</a>
            <p>&copy; 2026 Music Lab Pro</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
